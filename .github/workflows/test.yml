name: CI

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'front/**'
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'front/**'

jobs:
  static-check:
    name: Static Checks (lint / typecheck / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: front/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # tsc / build は生成された Prisma Client の型を参照するため先に生成する。
      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Lint (ESLint)
        run: pnpm lint

      - name: Typecheck (tsc --noEmit)
        run: pnpm exec tsc --noEmit

      # next build は静的生成時に Supabase クライアントを初期化するため、
      # ダミーの公開 env を与える（未設定だと createClient が "supabaseUrl is required" で失敗）。
      # 本番の実値は Vercel 側で設定。
      - name: Build (next build)
        run: pnpm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

  unit-test:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: front/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

  it-test:
    name: Integration Tests (Testcontainers)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      # Testcontainers 12 は Node 22+ の API（webidl.markAsUncloneable）に依存するため、
      # IT ジョブのみ Node 22 を使う（README のサポート範囲「Node.js 20 以上」内）。
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: front/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # IT は実 Prisma Client を使うため生成が必要。
      # DB は Testcontainers が Docker(ubuntu-latest に同梱)で起動するため事前準備は不要。
      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Run integration tests
        run: pnpm run test:it

  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: front/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Create .env.local for E2E
        run: |
          echo "E2E_BYPASS=1" >> .env.local
          echo "NEXT_PUBLIC_SUPABASE_URL=https://dummy.supabase.co" >> .env.local
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=dummy-anon-key" >> .env.local
          echo "DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy" >> .env.local

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # E2E は実 PostgreSQL(docker-compose)に対して実行する。
      # webServer は playwright.config で DATABASE_URL を compose DB に向ける（.env.local より優先）。
      - name: Start E2E database (docker-compose)
        run: pnpm run e2e:db:up

      - name: Run E2E tests
        run: pnpm run test:e2e
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: front/playwright-report/
          retention-days: 7
