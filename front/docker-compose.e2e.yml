# E2E / シナリオテスト用の PostgreSQL。
# `docker compose -f docker-compose.e2e.yml up -d --wait` で起動し、
# Playwright の webServer(dev) と globalSetup がこの DB に接続する。
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: e2e
      POSTGRES_PASSWORD: e2e
      POSTGRES_DB: e2e
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U e2e -d e2e']
      interval: 2s
      timeout: 5s
      retries: 15
